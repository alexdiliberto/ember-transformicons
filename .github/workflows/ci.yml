name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request: {}

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Setup Volta
        uses: volta-cli/action@v4
        with:
          node-version: '20.19.5'
          yarn-version: '1.22.22'
      - name: Yarn Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      - name: Install Dependencies
        run: yarn install --frozen-lockfile --non-interactive
      - name: Verify Dependency Resolutions
        run: |
          yarn why ember-cli-babel
          yarn why @babel/traverse

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [install]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Setup Volta
        uses: volta-cli/action@v4
        with:
          node-version: '20.19.5'
          yarn-version: '1.22.22'
      - name: Yarn Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      - name: Install Dependencies
        run: yarn install --frozen-lockfile --non-interactive
      - name: Lint
        run: yarn lint

  test-locked-deps:
    name: Locked Dependencies
    runs-on: ubuntu-latest
    needs: [install]
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Setup Volta
        uses: volta-cli/action@v4
        with:
          node-version: '20.19.5'
          yarn-version: '1.22.22'
      - name: Yarn Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      - name: Install Dependencies
        run: yarn install --frozen-lockfile --non-interactive
      - name: Browser Tests
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
        run: yarn test:ember

  test-floating-deps:
    name: Floating Dependencies
    runs-on: ubuntu-latest
    needs: [lint, test-locked-deps]
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Setup Volta
        uses: volta-cli/action@v4
        with:
          node-version: '20.19.5'
          yarn-version: '1.22.22'
      - name: Install Dependencies without Lockfile
        run: yarn install --no-lockfile --non-interactive
      - name: Browser Tests
        run: yarn test:ember

  test-ember-try:
    name: Ember Try
    runs-on: ubuntu-latest
    needs: [lint, test-locked-deps]
    strategy:
      fail-fast: false
      matrix:
        try-scenario:
          - ember-lts-5.8
          - ember-lts-5.12
          - ember-release
          - ember-beta
          - ember-canary
          #- embroider-safe
          #- embroider-optimized

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Setup Volta
        uses: volta-cli/action@v4
        with:
          node-version: '20.19.5'
          yarn-version: '1.22.22'
      - name: Yarn Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      - name: Install Dependencies
        run: yarn install --frozen-lockfile --non-interactive
      - name: "Scenario: ${{ matrix.try-scenario }}"
        # run: yarn ember try:one ${{ matrix.try-scenario }}
        # adding to bypass flaky teardown issues
        run: |
          set -euo pipefail
          # Run ember-try but don't let a flaky teardown crash the job
          set +e
          OUTPUT=$(./node_modules/.bin/ember try:one "${{ matrix.try-scenario }}" --skip-cleanup 2>&1)
          STATUS=$?
          set -e
          echo "$OUTPUT"

          # Treat true scenario success as job success
          if echo "$OUTPUT" | grep -qE "All [0-9]+ scenarios succeeded"; then
            exit 0
          fi

          # Otherwise fail with the original status
          exit $STATUS

  # https://github.com/ember-learn/ember-cli-addon-docs/issues/437
  deploy-prod:
    name: Production Deploy
    runs-on: ubuntu-latest
    needs: [test-floating-deps, test-ember-try]
    # if: (branch = master OR tag IS present) AND type = push
    # if: success() && github.ref == 'refs/heads/master' && github.event_name == 'push'
    if: success() && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Setup Volta
        uses: volta-cli/action@v4
        with:
          node-version: '20.19.5'
          yarn-version: '1.22.22'
      - name: Yarn Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      - name: Install Dependencies
        run: yarn install --frozen-lockfile --non-interactive
      - name: Set ENV
        # 'master' or 'v1.2.3'
        run: echo "ADDON_DOCS_VERSION_PATH=${GITHUB_REF##*/}" >> $GITHUB_ENV
      - name: Deploy
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: yarn ember deploy production
